<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Read the World</title>
    <meta name="description" content="One shared question a day. Answer for yourself, then predict how the world will answer." />
    <meta property="og:title" content="Read the World" />
    <meta property="og:description" content="One shared question a day. Answer for yourself, then predict how the world will answer." />
    <meta property="og:image" content="https://readtheworld.today/share/today/image" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Read the World daily question" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Read the World" />
    <meta name="twitter:description" content="One shared question a day. Answer for yourself, then predict how the world will answer." />
    <meta name="twitter:image" content="https://readtheworld.today/share/today/image" />
    <script>
      const marketingUrl = "https://readtheworld.today";
      const appUrl = "https://app.readtheworld.today";
      const code = window.location.pathname.split("/").filter(Boolean)[0] || "";
      const isCode = /^[A-Za-z0-9]{4,16}$/.test(code);

      if (isCode) {
        const target = new URL(`/${encodeURIComponent(code.toUpperCase())}`, appUrl);
        target.search = window.location.search;
        window.location.replace(target.toString());
      } else if (window.location.pathname !== "/") {
        window.location.replace(marketingUrl);
      }
    </script>
  </head>
  <body>
    <p>Opening Read the World...</p>
    <p><a id="fallback" href="https://readtheworld.today">Continue</a></p>
    <script>
      const fallback = document.getElementById("fallback");
      if (fallback && isCode) {
        fallback.href = `${appUrl}/${encodeURIComponent(code.toUpperCase())}${window.location.search}`;
      }
    </script>
  </body>
</html>
